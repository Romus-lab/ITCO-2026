<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Молекулярний світ навколо нас</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
}

#info{
    position:absolute;
    top:10px;
    left:10px;
    z-index:1000;
    background:rgba(0,0,0,0.7);
    color:white;
    padding:15px;
    border-radius:10px;
    max-width:350px;
}

button{
    padding:10px;
    margin-top:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="info">
    <h2>Молекулярний світ навколо нас</h2>
    <p><b>Автор:</b> Журавель Роман</p>

    <p>
        Візуалізація молекул, хімічних реакцій,
        каталізу та прогнозування властивостей
        молекул за допомогою Graph Neural Networks.
    </p>

    <button onclick="startReaction()">
        Запустити реакцію
    </button>

    <div id="prediction">
        GNN прогноз: очікування...
    </div>
</div>

<a-scene
    xr-mode-ui="enabled: true"
    vr-mode-ui="enabled: true"
    background="color: #050b18">

    <!-- Камера -->
    <a-entity position="0 1.6 0">
        <a-camera></a-camera>
    </a-entity>

    <!-- Освітлення -->
    <a-light
        type="ambient"
        color="#ffffff"
        intensity="1">
    </a-light>

    <a-light
        type="point"
        position="0 5 0"
        intensity="2">
    </a-light>

    <!-- Молекули навколо користувача -->

    <a-sphere color="#00BFFF"
              radius="0.18"
              position="-2 2 -4">
        <a-animation
            attribute="rotation"
            dur="4000"
            repeat="indefinite"
            to="0 360 0">
        </a-animation>
    </a-sphere>

    <a-sphere color="#00FFAA"
              radius="0.15"
              position="2 1.5 -3">
        <a-animation
            attribute="position"
            direction="alternate"
            dur="2000"
            repeat="indefinite"
            to="2 2 -3">
        </a-animation>
    </a-sphere>

    <a-sphere color="#FFAA00"
              radius="0.2"
              position="1 3 -5">
        <a-animation
            attribute="rotation"
            dur="3000"
            repeat="indefinite"
            to="360 360 0">
        </a-animation>
    </a-sphere>

    <a-sphere color="#AA66FF"
              radius="0.17"
              position="-3 1 -6">
        <a-animation
            attribute="position"
            direction="alternate"
            dur="2500"
            repeat="indefinite"
            to="-3 2 -6">
        </a-animation>
    </a-sphere>

    <!-- Реакційна зона -->

    <a-sphere
        id="reactant1"
        color="#ff0000"
        radius="0.3"
        position="-1 1 -3">
    </a-sphere>

    <a-sphere
        id="reactant2"
        color="#0000ff"
        radius="0.3"
        position="1 1 -3">
    </a-sphere>

    <!-- Продукт реакції -->

    <a-sphere
        id="product"
        color="#00ff00"
        radius="0.5"
        visible="false"
        position="0 1 -3">
    </a-sphere>

    <!-- Каталізатор -->

    <a-cylinder
        color="#FFD700"
        radius="0.4"
        height="1.5"
        position="0 0.75 -5">
    </a-cylinder>

    <a-text
        value="Каталізатор"
        color="#FFD700"
        position="-0.8 2 -5"
        scale="2 2 2">
    </a-text>

    <!-- GNN панель -->

    <a-plane
        color="#111"
        width="3"
        height="1.2"
        position="0 3 -4">
    </a-plane>

    <a-text
        id="gnnText"
        value="Graph Neural Network"
        color="#00FFAA"
        position="-1.3 3 -3.9"
        scale="1.5 1.5 1.5">
    </a-text>

</a-scene>

<script>

function startReaction(){

    let r1 = document.querySelector("#reactant1");
    let r2 = document.querySelector("#reactant2");
    let product = document.querySelector("#product");

    r1.setAttribute(
        "animation",
        "property: position; to: 0 1 -3; dur: 2000"
    );

    r2.setAttribute(
        "animation",
        "property: position; to: 0 1 -3; dur: 2000"
    );

    setTimeout(() => {

        r1.setAttribute("visible", false);
        r2.setAttribute("visible", false);

        product.setAttribute("visible", true);

        simulateGNN();

    }, 2200);
}

function simulateGNN(){

    const properties = [
        "Стабільність: 92%",
        "Розчинність: висока",
        "Токсичність: низька",
        "Реактивність: середня",
        "Енергія зв'язку: 8.4 еВ"
    ];

    const result =
        properties[Math.floor(Math.random()*properties.length)];

    document.getElementById("prediction").innerHTML =
        "<b>GNN прогноз:</b> " + result;

    document
      .querySelector("#gnnText")
      .setAttribute(
        "value",
        "GNN прогноз:\n" + result
      );
}

simulateGNN();

</script>

</body>
</html>
